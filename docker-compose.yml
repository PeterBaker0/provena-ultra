services:
  postgres:
    image: postgres:16
    container_name: provena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: provena
      POSTGRES_USER: provena
      POSTGRES_PASSWORD: provena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provena -d provena"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    image: provena-keycloak:local
    container_name: provena-keycloak
    restart: unless-stopped
    # Image includes provena/infrastructure/provena/keycloak/modules/*.jar (restrict-client-auth)
    # and themes/default, same sources as legacy provena keycloak Dockerfile + kc.sh build.
    # Realm JSON must match legacy replace_keycloak_vars() (scripts/resolve-keycloak-dev-realm.mjs).
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: start-dev --http-port=8080 --import-realm
    volumes:
      - ./docker/keycloak/import/DEV-realm.json:/opt/keycloak/data/import/DEV-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  object-store:
    image: minio/minio:latest
    container_name: provena-object-store
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: provena
      MINIO_ROOT_PASSWORD: provena-secret
    command: server /data --console-address ":9001"
    volumes:
      - object_store_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mailpit:
    image: axllent/mailpit:latest
    container_name: provena-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    image: node:22
    container_name: provena-api
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/api dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://provena:provena@postgres:5432/provena
      S3_ENDPOINT: http://object-store:9000
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/DEV
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/DEV/protocol/openid-connect/certs
      KEYCLOAK_AUTH_ENDPOINT: http://keycloak:8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      object-store:
        condition: service_started
      mailpit:
        condition: service_started

  worker:
    image: node:22
    container_name: provena-worker
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/worker dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://provena:provena@postgres:5432/provena
      S3_ENDPOINT: http://object-store:9000
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/DEV
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/DEV/protocol/openid-connect/certs
      KEYCLOAK_AUTH_ENDPOINT: http://keycloak:8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  registry-ui:
    image: node:22
    container_name: provena-registry-ui
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/registry-ui dev"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_started

  data-store-ui:
    image: node:22
    container_name: provena-data-store-ui
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/data-store-ui dev"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "3003:3003"
    depends_on:
      api:
        condition: service_started

  prov-ui:
    image: node:22
    container_name: provena-prov-ui
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/prov-ui dev"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "3004:3004"
    depends_on:
      api:
        condition: service_started

  landing-portal-ui:
    image: node:22
    container_name: provena-landing-portal-ui
    restart: unless-stopped
    working_dir: /workspace
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @provena/landing-portal-ui dev"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "3005:3005"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  object_store_data:
